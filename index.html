<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Auto-Graded Quiz</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 650px; margin: 30px auto; padding: 20px; color: #1f2937; line-height: 1.5; }
    .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: #fff; }
    .key-box { background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; padding: 12px; margin-bottom: 20px; }
    input[type="password"], textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #d1d5db; font-size: 14px; margin-top: 6px; }
    textarea { height: 90px; resize: vertical; }
    button { background-color: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 12px; transition: background 0.2s; }
    button:hover { background-color: #1d4ed8; }
    button:disabled { background-color: #9ca3af; cursor: not-allowed; }
    .next-btn { background-color: #059669; }
    .next-btn:hover { background-color: #047857; }
    .feedback { margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
    .feedback.correct { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .feedback.incorrect { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .feedback.error { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <!-- API Key Setup (Keeps key safe from GitHub scrapers) -->
  <div class="key-box">
    <label for="api-key" style="font-weight: 600; font-size: 0.85em; color: #374151;">
      GEMINI API KEY (<a href="https://aistudio.google.com/" target="_blank">Get free key</a>)
    </label>
    <input type="password" id="api-key" placeholder="Paste your Gemini API key here..." />
  </div>

  <!-- Main Quiz Container -->
  <div id="quiz-container">
    <div id="question-number" style="font-size: 0.85em; font-weight: bold; color: #6b7280; text-transform: uppercase;">Question 1</div>
    <h2 id="question-text" style="margin-top: 4px;">Loading...</h2>

    <label for="user-answer" style="font-size: 0.9em; font-weight: 600;">Your Answer:</label>
    <textarea id="user-answer" placeholder="Write your explanation here..."></textarea>

    <div>
      <button id="submit-btn" onclick="gradeAnswer()">Submit Answer</button>
    </div>

    <!-- AI Feedback -->
    <div id="feedback-box" class="feedback"></div>

    <!-- Navigation (Triggers Next Question) -->
    <div id="navigation-box" class="hidden" style="margin-top: 15px;">
      <button class="next-btn" onclick="nextQuestion()">Next Question ➔</button>
    </div>
  </div>

  <!-- End Screen -->
  <div id="end-screen" class="hidden" style="text-align: center; padding: 20px 0;">
    <h2>🎉 Quiz Finished!</h2>
    <p>You have submitted all answers.</p>
    <button onclick="restartQuiz()">Try Again</button>
  </div>
</div>

<script>
  // Quiz Data Array
  const quizData = [
    {
      question: "What is the primary cause of Earth's ocean tides?",
      rubric: "Answer must state that tides are primarily caused by the gravitational pull of the Moon (and secondarily the Sun) acting on Earth's oceans."
    },
    {
      question: "Why do plant leaves look green?",
      rubric: "Answer must explain that chlorophyll absorbs red and blue light while reflecting green light back to our eyes."
    }
  ];

  let currentIndex = 0;

  function loadQuestion() {
    const currentQ = quizData[currentIndex];
    document.getElementById("question-number").innerText = `Question ${currentIndex + 1} of ${quizData.length}`;
    document.getElementById("question-text").innerText = currentQ.question;
    document.getElementById("user-answer").value = "";
    document.getElementById("user-answer").disabled = false;
    
    // Reset buttons and feedback state
    const feedbackBox = document.getElementById("feedback-box");
    feedbackBox.style.display = "none";
    feedbackBox.className = "feedback";
    document.getElementById("navigation-box").classList.add("hidden");
    
    const submitBtn = document.getElementById("submit-btn");
    submitBtn.disabled = false;
    submitBtn.innerText = "Submit Answer";
  }

  async function gradeAnswer() {
    const apiKey = document.getElementById("api-key").value.trim();
    const userAnswer = document.getElementById("user-answer").value.trim();
    const feedbackBox = document.getElementById("feedback-box");
    const submitBtn = document.getElementById("submit-btn");

    if (!apiKey) {
      alert("Please paste your free Gemini API key into the top box first!");
      return;
    }
    if (!userAnswer) {
      alert("Please write an answer before submitting.");
      return;
    }

    // Lock UI during call
    submitBtn.disabled = true;
    submitBtn.innerText = "Grading with AI...";
    document.getElementById("user-answer").disabled = true;

    const currentQ = quizData[currentIndex];

    // Build JSON Enforcement Prompt
    const promptText = `
      You are an automated quiz grader.
      Question: "${currentQ.question}"
      Rubric: "${currentQ.rubric}"
      Student Answer: "${userAnswer}"

      Evaluate if the answer satisfies the rubric.
      Respond strictly with a single, valid JSON object following this format (no markdown, no extra commentary):
      {
        "isCorrect": true or false,
        "feedback": "Concise 1-2 sentence explanation of why it is right or wrong based on the rubric."
      }
    `;

    try {
      // Direct HTTP Request to Gemini 2.5 Flash
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: promptText }] }],
          generationConfig: {
            responseMimeType: "application/json" // Guarantees JSON response
          }
        })
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error?.message || `Server Error ${response.status}`);
      }

      const data = await response.json();
      const responseText = data.candidates[0].content.parts[0].text;
      
      // Parse JSON from Gemini
      const result = JSON.parse(responseText);

      // Display results
      feedbackBox.style.display = "block";
      feedbackBox.className = `feedback ${result.isCorrect ? 'correct' : 'incorrect'}`;
      feedbackBox.innerHTML = `<strong>${result.isCorrect ? '✅ Correct' : '❌ Incorrect'}</strong><br>${result.feedback}`;

      // Show the "Next Question" button
      document.getElementById("navigation-box").classList.remove("hidden");
      submitBtn.innerText = "Submitted";

    } catch (err) {
      console.error("API Error:", err);
      feedbackBox.style.display = "block";
      feedbackBox.className = "feedback error";
      feedbackBox.innerHTML = `<strong>API Error:</strong> ${err.message}. Please check your API key and try again.`;
      
      // Re-enable input on failure
      submitBtn.disabled = false;
      submitBtn.innerText = "Submit Answer";
      document.getElementById("user-answer").disabled = false;
    }
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex < quizData.length) {
      loadQuestion();
    } else {
      // Hide quiz, show end screen
      document.getElementById("quiz-container").classList.add("hidden");
      document.getElementById("end-screen").classList.remove("hidden");
    }
  }

  function restartQuiz() {
    currentIndex = 0;
    document.getElementById("end-screen").classList.add("hidden");
    document.getElementById("quiz-container").classList.remove("hidden");
    loadQuestion();
  }

  // Initialize
  loadQuestion();
</script>

</body>
</html>
