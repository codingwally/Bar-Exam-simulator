name: Validate Labor Law CMS

on:
  pull_request:
    paths:
      - 'content/labor-law-cms/**'
      - 'scripts/validate-labor-cms.mjs'
      - 'scripts/test-labor-cms.mjs'
      - 'scripts/test-labor-practice-contract.mjs'
      - 'scripts/test-labor-client-bootstrap.mjs'
      - 'scripts/test-labor-release-gate.mjs'
      - 'supabase/functions/labor-practice/**'
      - 'supabase/migrations/**'
      - 'assets/labor-practice.*'
      - 'index.html'
  push:
    branches: ['main']
    paths:
      - 'content/labor-law-cms/**'
      - 'scripts/validate-labor-cms.mjs'
      - 'scripts/test-labor-cms.mjs'
      - 'scripts/test-labor-practice-contract.mjs'
      - 'scripts/test-labor-client-bootstrap.mjs'
      - 'scripts/test-labor-release-gate.mjs'
      - 'supabase/functions/labor-practice/**'
      - 'supabase/migrations/**'
      - 'assets/labor-practice.*'
      - 'index.html'

permissions:
  contents: read

jobs:
  validate-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate the Phase 1 CMS structure
        run: node scripts/validate-labor-cms.mjs --mode=template
      - name: Test the CMS validator
        run: node scripts/test-labor-cms.mjs
      - name: Test Labor Law question-bank contracts
        run: node scripts/test-labor-practice-contract.mjs
      - name: Test Labor Law client integration
        run: node scripts/test-labor-client-bootstrap.mjs
      - name: Enforce the Labor Law release gate
        run: node scripts/test-labor-release-gate.mjs
