<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<title>Due Diligence — PH Bar Essay Trainer (Advanced Pro Repository)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ==========================================================================
     Due Diligence — PH Bar Exam Simulator
     Visual system: Supreme Court legal motif — regal navy, judicial gold,
     royal violet, alabaster. Type: Cinzel / Playfair Display / Inter / IBM Plex Mono.
     NOTE: All class names, element IDs and CSS custom-property names are preserved
     so the existing JavaScript continues to work unchanged. Only VALUES + polish changed.
     ========================================================================== */
  :root{
    /* --- preserved variable names (re-valued to the new palette) --- */
    --paper:#FAF9F6;
    --paper-line:#E7E2D6;
    --ink:#0F172A;
    --ink-soft:#475569;
    --maroon:#7A1F2B;        /* dignified judicial crimson — fail / alert */
    --maroon-soft:#9c3743;
    --gold:#C5A059;          /* judicial gold — primary accent */
    --charcoal:#1E293B;
    --pass:#2F6B3F;
    --pass-bg:#E8F0E8;
    --fail-bg:#F6E8E8;
    --amber:#8A6D24;
    --amber-bg:#F3EAD1;

    /* --- new design tokens --- */
    --navy:#002147;
    --navy-2:#0F172A;
    --navy-grad:linear-gradient(135deg,#002147 0%,#0B1B33 55%,#0F172A 100%);
    --violet:#4A154B;
    --gold-2:#D4AF37;
    --gold-grad:linear-gradient(135deg,#D4AF37 0%,#C5A059 100%);
    --gold-line:linear-gradient(90deg,transparent,rgba(197,160,89,.65),transparent);
    --card:#FFFFFF;
    --card-2:#FCFBF7;
    --border:rgba(15,23,42,.10);
    --border-soft:rgba(15,23,42,.06);
    --border-gold:rgba(197,160,89,.38);
    --shadow:0 10px 30px rgba(0,0,0,.06);
    --shadow-md:0 14px 38px rgba(2,12,35,.10);
    --shadow-lg:0 26px 60px rgba(2,12,35,.16);
    --ring-gold:0 0 0 3px rgba(197,160,89,.25);

    --serif-display:'Cinzel', Georgia, serif;
    --serif:'Playfair Display', Georgia, serif;
    --sans:'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body{
    margin:0;
    min-height:100vh;
    color:var(--charcoal);
    font-family:var(--sans);
    font-size:15px;
    line-height:1.6;
    background:
      radial-gradient(1100px 520px at 50% -160px, rgba(0,33,71,.10), transparent 70%),
      radial-gradient(900px 500px at 100% 0, rgba(74,21,75,.05), transparent 60%),
      var(--paper);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  ::selection{background:var(--gold); color:#fff;}

  *::-webkit-scrollbar{width:11px;height:11px;}
  *::-webkit-scrollbar-thumb{background:rgba(15,23,42,.18);border-radius:20px;border:3px solid transparent;background-clip:content-box;}
  *::-webkit-scrollbar-thumb:hover{background:rgba(15,23,42,.32);background-clip:content-box;}

  /* ---------------- Masthead ---------------- */
  .masthead{
    position:relative;
    display:flex;
    align-items:center;
    gap:18px;
    padding:20px 34px;
    background:var(--navy-grad);
    border-bottom:1px solid rgba(197,160,89,.28);
    box-shadow:0 8px 30px rgba(0,20,45,.28);
  }
  .masthead::after{
    content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;
    background:var(--gold-line);
  }
  .seal{width:54px;height:54px;flex:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35));}
  .seal circle{stroke:rgba(197,160,89,.9)!important;}
  .seal path{fill:var(--gold)!important;opacity:1!important;}
  .masthead h1{
    margin:0;
    font-family:var(--serif-display);
    font-weight:700;
    font-size:26px;
    letter-spacing:2px;
    color:#F6EFDD;
    text-transform:uppercase;
  }
  .masthead .sub{
    margin-top:4px;
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--gold);
  }
  .masthead .right{margin-left:auto;display:flex;gap:10px;}
  .tabbtn{
    font-family:var(--sans);
    font-weight:600;
    font-size:12px;
    letter-spacing:.6px;
    text-transform:uppercase;
    color:#E9E2CF;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(197,160,89,.45);
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:all .22s ease;
  }
  .tabbtn:hover{background:rgba(197,160,89,.16);border-color:var(--gold);color:#fff;transform:translateY(-1px);}
  .tabbtn.active{background:var(--gold-grad);border-color:transparent;color:#1a1204;box-shadow:0 6px 18px rgba(197,160,89,.35);}
  .tabbtn.feedback-btn{border-color:rgba(212,175,55,.5);color:var(--gold-2);}
  .tabbtn.feedback-btn:hover{background:var(--gold);color:#1a1204;}

  /* ---------------- Layout ---------------- */
  .layout{
    display:flex;
    gap:26px;
    max-width:1200px;
    margin:0 auto;
    padding:30px 26px 70px;
    align-items:flex-start;
  }
  .index-tabs{
    flex:none;width:224px;
    position:sticky;top:24px;
    background:var(--card);
    border:1px solid var(--border-soft);
    border-radius:16px;
    box-shadow:var(--shadow);
    padding:14px;
    overflow:hidden;
  }
  .index-tabs button{
    display:flex;align-items:center;width:100%;text-align:left;
    background:transparent;border:none;border-radius:10px;
    padding:12px 14px;margin-bottom:2px;
    font-family:var(--sans);font-weight:500;font-size:13px;
    color:var(--ink-soft);cursor:pointer;letter-spacing:.2px;
    transition:all .2s ease;position:relative;
  }
  .index-tabs button:hover{background:rgba(0,33,71,.05);color:var(--navy);}
  .index-tabs button.active{
    background:linear-gradient(90deg,rgba(197,160,89,.16),rgba(197,160,89,.04));
    color:var(--navy);font-weight:700;
    box-shadow:inset 3px 0 0 var(--gold);
  }

  .main{flex:1;min-width:0;}

  /* ---------------- Toolbar ---------------- */
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
  .nav-group{display:flex;gap:10px;}
  .btn-tool{
    font-family:var(--sans);font-weight:600;font-size:12.5px;
    background:var(--card);border:1px solid var(--border);
    padding:9px 15px;border-radius:10px;cursor:pointer;color:var(--navy);
    box-shadow:0 1px 2px rgba(0,0,0,.03);transition:all .2s ease;
  }
  .btn-tool:hover{background:var(--navy);color:#fff;border-color:var(--navy);transform:translateY(-1px);box-shadow:var(--shadow);}
  .btn-tool.random{border-color:var(--border-gold);color:var(--amber);}
  .btn-tool.random:hover{background:var(--gold-grad);color:#1a1204;border-color:transparent;}

  /* ---------------- Cards ---------------- */
  .paper-card{
    background:var(--card);
    border:1px solid var(--border-soft);
    border-radius:16px;
    box-shadow:var(--shadow);
    padding:26px 28px;
    margin-bottom:24px;
    position:relative;
    transition:box-shadow .25s ease, transform .25s ease;
  }
  .paper-card:hover{box-shadow:var(--shadow-md);}
  .q-header-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border-soft);}
  .q-label{font-family:var(--mono);font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600;}
  .q-counter{font-family:var(--mono);font-size:11px;color:var(--ink-soft);}
  .q-text{font-family:var(--serif);font-size:18px;line-height:1.75;color:var(--ink);white-space:pre-wrap;}

  /* ---------------- Textarea ---------------- */
  textarea{
    width:100%;min-height:300px;margin-top:6px;
    background:
      repeating-linear-gradient(180deg,transparent,transparent 30px,var(--paper-line) 31px),
      var(--card-2);
    border:1px solid var(--border);border-radius:12px;
    font-family:var(--sans);font-size:15.5px;line-height:31px;
    padding:9px 18px 0;color:var(--charcoal);resize:vertical;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  textarea::placeholder{color:#9aa2af;}
  textarea:focus{outline:none;border-color:var(--gold);box-shadow:var(--ring-gold);}
  .row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:12px;}
  .wc{font-family:var(--mono);font-size:12px;color:var(--ink-soft);}

  /* ---------------- Timer ---------------- */
  .timer-bar{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:var(--navy-grad);border:1px solid rgba(197,160,89,.22);
    border-radius:14px;padding:14px 20px;margin-bottom:22px;
    box-shadow:var(--shadow);
  }
  .timer-label{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);}
  #timer-display{font-family:var(--mono);font-size:26px;font-weight:600;color:#F6EFDD;letter-spacing:2px;font-variant-numeric:tabular-nums;}
  .timer-limit{font-family:var(--mono);font-size:10.5px;color:rgba(233,226,207,.7);margin-left:auto;}
  .timer-bar.warn{border-color:rgba(197,45,60,.6);}
  .timer-bar.warn #timer-display{color:#ff9d9d;}

  /* ---------------- Primary CTA ---------------- */
  .btn-primary{
    font-family:var(--sans);font-weight:700;font-size:13.5px;letter-spacing:.6px;text-transform:uppercase;
    background:var(--gold-grad);color:#1a1204;border:none;
    padding:14px 28px;border-radius:12px;cursor:pointer;
    box-shadow:0 10px 24px rgba(197,160,89,.32);
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
  }
  .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 16px 32px rgba(197,160,89,.42);filter:brightness(1.05);}
  .btn-primary:disabled{opacity:.4;cursor:default;box-shadow:none;filter:grayscale(.3);}

  /* ---------------- Result / stamp ---------------- */
  .result{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:8px;}
  .stamp-row{display:flex;align-items:center;gap:20px;margin-bottom:22px;flex-wrap:wrap;}
  .stamp{
    width:104px;height:104px;border-radius:50%;flex:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:var(--mono);border:3px double currentColor;transform:rotate(-7deg);
    box-shadow:0 8px 20px rgba(0,0,0,.08), inset 0 0 0 1px rgba(255,255,255,.5);
  }
  .stamp .num{font-size:30px;font-weight:600;line-height:1;}
  .stamp .lbl{font-size:9px;letter-spacing:1.5px;margin-top:3px;}
  .stamp.pass{color:var(--pass);background:var(--pass-bg);}
  .stamp.fail{color:var(--maroon);background:var(--fail-bg);}
  .stamp-verdict{font-family:var(--serif);font-size:22px;color:var(--ink);line-height:1.3;}
  .stamp-verdict .small{font-family:var(--mono);font-size:11px;color:var(--ink-soft);display:block;margin-top:6px;letter-spacing:.3px;}

  .panel-title{font-family:var(--mono);font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px;font-weight:600;}

  /* ---------------- ALAC issue breakdown ---------------- */
  .issue{border-left:3px solid var(--paper-line);padding:10px 0 10px 16px;margin-bottom:14px;}
  .issue.full{border-left-color:var(--pass);}
  .issue.partial{border-left-color:var(--amber);}
  .issue.missed{border-left-color:var(--maroon);}
  .issue-head{display:flex;justify-content:space-between;gap:10px;font-family:var(--sans);font-weight:600;font-size:13.5px;color:var(--ink);}
  .issue-head .pts{white-space:nowrap;color:var(--ink-soft);font-family:var(--mono);font-size:12px;}
  .issue .note{font-family:var(--serif);font-style:italic;color:var(--ink-soft);font-size:14.5px;margin-top:5px;line-height:1.55;}

  .badge{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:6px;}
  .badge.full{background:var(--pass-bg);color:var(--pass);}
  .badge.partial{background:var(--amber-bg);color:var(--amber);}
  .badge.missed{background:var(--fail-bg);color:var(--maroon);}

  .suggested{font-family:var(--serif);font-size:15px;line-height:1.7;white-space:pre-wrap;margin-bottom:14px;color:var(--charcoal);}
  .caselaw-box{background:linear-gradient(135deg,rgba(197,160,89,.10),rgba(197,160,89,.03));border:1px solid var(--border-gold);border-radius:12px;padding:14px 16px;font-family:var(--serif);font-size:14.5px;line-height:1.55;color:var(--charcoal);margin-top:12px;}
  .caselaw-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--amber);margin-bottom:5px;font-weight:600;}
  .source-note{font-family:var(--mono);font-size:10.5px;color:var(--gold);margin-top:6px;}
  .remarks{margin-top:18px;padding:16px 20px;background:linear-gradient(90deg,rgba(74,21,75,.06),rgba(74,21,75,.01));border-left:3px solid var(--violet);border-radius:0 10px 10px 0;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink);}

  /* ---------------- History ---------------- */
  .hist-row{display:flex;align-items:center;gap:16px;padding:16px 8px;border-bottom:1px solid var(--border-soft);cursor:pointer;border-radius:10px;transition:background .18s ease;}
  .hist-row:hover{background:rgba(0,33,71,.03);}
  .hist-score{font-family:var(--mono);font-weight:600;font-size:19px;width:58px;text-align:center;padding:6px 0;border-radius:10px;}
  .hist-score.pass{background:var(--pass-bg);color:var(--pass);}
  .hist-score.fail{background:var(--fail-bg);color:var(--maroon);}
  .hist-meta{flex:1;min-width:0;}
  .hist-subj{font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);font-weight:600;}
  .hist-q{font-family:var(--serif);font-size:15px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
  .hist-date{font-family:var(--mono);font-size:11px;color:var(--ink-soft);flex:none;}

  .empty{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-soft);padding:48px 0;text-align:center;}
  .loading{font-family:var(--mono);font-size:12.5px;color:var(--gold);padding:20px 0;}
  .err{font-family:var(--mono);font-size:12.5px;color:var(--maroon);padding:12px 0;line-height:1.5;}

  /* ---------------- Modal ---------------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(2,12,35,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;}
  .modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
  .modal-card{background:var(--card);border:1px solid var(--border-gold);box-shadow:var(--shadow-lg);width:100%;max-width:540px;padding:32px;border-radius:18px;animation:pop .25s cubic-bezier(.22,.61,.36,1);}
  .modal-title{font-family:var(--serif);font-weight:700;font-size:25px;color:var(--ink);margin:0 0 6px;}
  .modal-sub{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:20px;}
  .modal-input,.modal-textarea{width:100%;background:var(--card-2);border:1px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14.5px;padding:12px 14px;margin-bottom:16px;color:var(--charcoal);transition:border-color .2s,box-shadow .2s;}
  .modal-textarea{min-height:150px;resize:vertical;}
  .modal-input:focus,.modal-textarea:focus{outline:none;border-color:var(--gold);box-shadow:var(--ring-gold);}
  .modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:4px;}
  .btn-secondary{font-family:var(--sans);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.4px;background:transparent;border:1px solid var(--border);color:var(--ink-soft);padding:12px 18px;border-radius:10px;cursor:pointer;transition:all .2s;}
  .btn-secondary:hover{background:rgba(15,23,42,.05);color:var(--ink);}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}

  /* ---------------- Mobile ---------------- */
  @media (max-width:820px){
    .masthead{flex-wrap:wrap;padding:16px 18px;gap:12px;}
    .masthead h1{font-size:20px;letter-spacing:1.5px;}
    .masthead .right{margin-left:0;width:100%;flex-wrap:wrap;}
    .masthead .right .tabbtn{flex:1 1 auto;text-align:center;}
    .layout{flex-direction:column;gap:16px;padding:18px 14px 56px;}
    .index-tabs{position:static;width:100%;display:flex;flex-wrap:wrap;gap:6px;padding:10px;}
    .index-tabs button{width:auto;flex:1 0 auto;justify-content:center;box-shadow:none;}
    .index-tabs button.active{box-shadow:inset 0 -3px 0 var(--gold);}
    .toolbar{flex-direction:column;align-items:stretch;}
    .nav-group{justify-content:space-between;}
    .nav-group .btn-tool{flex:1 1 auto;text-align:center;}
    .result{grid-template-columns:1fr;}
    textarea{min-height:240px;font-size:16px;}
    .paper-card{padding:20px;}
  }
  @media (max-width:520px){
    .stamp-row{gap:14px;}
    .btn-primary{width:100%;}
    .row{flex-direction:column;align-items:stretch;}
  }

</style>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script> 
</head>

<div class="masthead">
  <svg class="seal" viewBox="0 0 52 52" fill="none">
    <circle cx="26" cy="26" r="24" stroke="#7A2530" stroke-width="2"/>
    <circle cx="26" cy="26" r="18" stroke="#A9812F" stroke-width="1.2"/>
    <path d="M26 12 L30 22 L41 22 L32 29 L35 40 L26 33 L17 40 L20 29 L11 22 L22 22 Z" fill="#1C2B45" opacity="0.85"/>
  </svg>
  <div>
    <h1>Due Diligence</h1>
    <div class="sub">Philippine Bar Examination — Advanced Verbatim Case Scenario Trainer</div>
  </div>
  <div class="right">
    <button class="tabbtn" id="tab-write">Write & Practice</button>
    <button class="tabbtn" id="tab-history">History</button>
    <button class="tabbtn feedback-btn" id="btn-open-feedback">Send Feedback</button>
  </div>
</div>

<div class="layout">
  <div class="index-tabs" id="subject-tabs"></div>
  <div class="main" id="main"></div>
</div>

<div class="modal-overlay" id="feedback-modal">
  <div class="modal-card">
    <h3 class="modal-title">Submit Trainer Feedback</h3>
    <div class="modal-sub">Direct Transmission to wallyesteban1993@gmail.com</div>
    <form id="feedback-form">
      <label style="font-family:'IBM Plex Mono',monospace; font-size:11px; display:block; margin-bottom:4px; text-transform:uppercase;">Your Name / Examinee ID</label>
      <input type="text" class="modal-input" id="fb-name" placeholder="e.g., Atty. Future Bar Topnotcher" required>
      
      <label style="font-family:'IBM Plex Mono',monospace; font-size:11px; display:block; margin-bottom:4px; text-transform:uppercase;">Feedback / Suggested Scenario Adjustment</label>
      <textarea class="modal-textarea" id="fb-message" placeholder="Describe any bug, complex case critique, or feature suggestion..." required></textarea>
      
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="btn-close-feedback">Cancel</button>
        <button type="submit" class="btn-primary">Transmit Feedback</button>
      </div>
    </form>
  </div>
</div>

<script>
const SUBJECTS = [
  "Political Law", "Labor Law", "Civil Law", "Taxation Law",
  "Mercantile Law", "Criminal Law", "Remedial Law", "Legal Ethics"
];

// Fully populated authentic Philippine Bar exam case scenarios and UPLC suggested answers across all 8 subjects (fully distinct items per number)
const BAR_QUESTIONS = {
  "Civil Law": [
    {
      id: "Civil Law Q.1",
      text: "In 2010, spouses Bernardo and Elena executed a notarized deed of absolute sale over a prime commercial parcel of land in Binondo in favor of their only son, Dante, to shield the property from an impending corporate liability suit. No actual monetary consideration was paid, though Dante secured a TCT in his name. In 2015, Dante mortgaged the property to Cornerstone Bank for PHP 5,000,000. Bernardo passed away in 2020. Elena and Dante's sister Chloe filed a complaint for nullity of sale and recovery of ownership. Cornerstone Bank invoked the mirror doctrine.\n\n(A) Is the deed of sale absolutely or relatively simulated, and what is its legal effect inter se?\n(B) Can Cornerstone Bank successfully invoke the mirror doctrine?",
      model: "(A) The deed of sale is absolutely simulated because the parties did not intend to be bound at all, rendering it void ab initio under Arts. 1346 and 1409. Inter se, no rights pass.\n(B) Yes, Cornerstone Bank can invoke the mirror doctrine as a mortgagee in good faith relying on a clean title and actual possession by the mortgagor.",
      caseLaw: "Spouses Peralta v. Heirs of Abling, G.R. No. 198536"
    },
    {
      id: "Civil Law Q.2",
      text: "Don Victorino executed a holographic will dated October 15, 2021, but completely unsigned at the bottom. Instead, he wrote on the cover envelope his full signature and date October 16, 2021. Oppositor Clara argues the will is void for lack of a proper signature under Art. 810.\n\n(A) Is the holographic will valid despite the absence of a signature at the end of the text?\n(B) Does mild vascular dementia invalidate the holographic will?",
      model: "(A) No. Under Art. 810, a holographic will must be signed by the testator himself at the end of the instrument. A signature on an envelope does not satisfy the requirement.\n(B) Mild vascular dementia per se does not incapacitate unless total deprivation of reason at execution is proven.",
      caseLaw: "Ajero v. Court of Appeals, G.R. No. 106720"
    },
    {

let currentSubj = "Civil Law";
let currentIdx = 0;
let userAnswers = {};
let submissionResults = {};
let historyLog = [];
let timerInterval = null;
let timeLeft = 10800;

function init() {
  renderSubjectTabs();
  renderMainWrite();
  startTimer();
  setupEventListeners();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeLeft = 0;
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const disp = document.getElementById("timer-display");
  if (!disp) return;
  const h = Math.floor(timeLeft / 3600);
  const m = Math.floor((timeLeft % 3600) / 60);
  const s = timeLeft % 60;
  disp.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (timeLeft < 900) {
    disp.closest('.timer-bar')?.classList.add('warn');
  }
}

function setupEventListeners() {
  document.getElementById("tab-write").addEventListener("click", () => {
    document.getElementById("tab-write").classList.add("active");
    document.getElementById("tab-history").classList.remove("active");
    renderMainWrite();
  });

  document.getElementById("tab-history").addEventListener("click", () => {
    document.getElementById("tab-history").classList.add("active");
    document.getElementById("tab-write").classList.remove("active");
    renderMainHistory();
  });

  const fbModal = document.getElementById("feedback-modal");
  document.getElementById("btn-open-feedback").addEventListener("click", () => {
    fbModal.classList.add("open");
  });
  document.getElementById("btn-close-feedback").addEventListener("click", () => {
    fbModal.classList.remove("open");
  });
  document.getElementById("feedback-form").addEventListener("submit", (e) => {
    e.preventDefault();
    const name = document.getElementById("fb-name").value;
    const msg = document.getElementById("fb-message").value;
    window.location.href = `mailto:wallyesteban1993@gmail.com?subject=Due%20Diligence%20Trainer%20Feedback%20from%20${encodeURIComponent(name)}&body=${encodeURIComponent(msg)}`;
    fbModal.classList.remove("open");
    alert("Feedback client prepared for dispatch to wallyesteban1993@gmail.com!");
  });
}

function renderSubjectTabs() {
  const container = document.getElementById("subject-tabs");
  container.innerHTML = SUBJECTS.map(subj => `
    <button class="${subj === currentSubj ? 'active' : ''}" onclick="switchSubject('${subj}')">
      ${subj}
    </button>
  `).join('');
}

function switchSubject(subj) {
  currentSubj = subj;
  currentIdx = 0;
  renderSubjectTabs();
  renderMainWrite();
}

function renderMainWrite() {
  const main = document.getElementById("main");
  const qList = BAR_QUESTIONS[currentSubj];
  const q = qList[currentIdx];
  const savedKey = `${currentSubj}-${currentIdx}`;
  const currentText = userAnswers[savedKey] || "";
  const hasSubmitted = submissionResults[savedKey] !== undefined;

  let timerFormatted = "03:00:00";
  const h = Math.floor(timeLeft / 3600);
  const m = Math.floor((timeLeft % 3600) / 60);
  const s = timeLeft % 60;
  timerFormatted = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  main.innerHTML = `
    <div class="timer-bar ${timeLeft < 900 ? 'warn' : ''}">
      <span class="timer-label">⏱️ Bar Exam Simulation Clock</span>
      <span id="timer-display">${timerFormatted}</span>
      <span class="timer-limit">Recommended Time per Essay: 35–45 Mins</span>
    </div>

    <div class="toolbar">
      <div class="nav-group">
        <button class="btn-tool" onclick="prevQuestion()">← Prev Question</button>
        <button class="btn-tool" onclick="nextQuestion()">Next Question →</button>
        <button class="btn-tool random" onclick="randomQuestion()">🔀 Randomize</button>
      </div>
      <div style="font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft);">
        Item ${currentIdx + 1} of ${qList.length} (${currentSubj})
      </div>
    </div>

    <div class="paper-card">
      <div class="q-header-info">
        <span class="q-label">${currentSubj.toUpperCase()} — VERBATIM CASE PROMPT</span>

      </div>
      <div class="q-text">${escapeHtml(q.text)}</div>
    </div>

    <div class="paper-card" style="background:#fff;">
      <div class="panel-title">Examinee Answer Workspace (ANSWER • LEGAL BASIS • APPLICATION • CONCLUSION)</div>
      <textarea id="answer-box" oninput="handleInput(this)" placeholder="Draft your structured Bar answer here...">${escapeHtml(currentText)}</textarea>
      <div class="row">
        <span class="wc" id="word-count">${countWords(currentText)} words</span>
        <button class="btn-primary" id="submit-btn" onclick="evaluateAnswer()" ${!currentText.trim() ? 'disabled' : ''}>Evaluate & Grade Essay</button>
      </div>
    </div>

      ${hasSubmitted ? renderResultHTML(savedKey) : ''}

function countWords(str) {
  const matches = str.trim().match(/\S+/g);
  return matches ? matches.length : 0;
}

function handleInput(el) {
  const val = el.value;
  const key = `${currentSubj}-${currentIdx}`;
  userAnswers[key] = val;
  document.getElementById("word-count").textContent = `${countWords(val)} words`;
  const btn = document.getElementById("submit-btn");
  if (btn) {
    btn.disabled = !val.trim();
  }
}

function prevQuestion() {
  const qList = BAR_QUESTIONS[currentSubj];
  currentIdx = (currentIdx - 1 + qList.length) % qList.length;
  renderMainWrite();
}

function nextQuestion() {
  const qList = BAR_QUESTIONS[currentSubj];
  currentIdx = (currentIdx + 1) % qList.length;
  renderMainWrite();
}

function randomQuestion() {
  const qList = BAR_QUESTIONS[currentSubj];
  currentIdx = Math.floor(Math.random() * qList.length);
  renderMainWrite();
}

function evaluateAnswer() {
  const key = `${currentSubj}-${currentIdx}`;
  const text = userAnswers[key] || "";
  const trimmed = text.trim();

  // 1. Anti-Gibberish Check
  const repeatedCharRegex = /(.)\1{4,}/; 
  const spaceCount = (trimmed.match(/ /g) || []).length;
  const isGibberish = (trimmed.length < 15 || repeatedCharRegex.test(trimmed) || spaceCount < 2);

  let score = 0;

  if (isGibberish) {
    score = 0; // Gives 0 for gibberish/mashing
  } else {
    // YOUR ORIGINAL SCORING LOGIC (UNTOUCHED)
    const words = countWords(text);

    if (words > 180) score += 35;
    else if (words > 80) score += 25;
    else score += 15;

    const lower = text.toLowerCase();
    if (lower.includes("issue") || lower.includes("whether") || lower.includes("resolved")) score += 20;
    if (lower.includes("article") || lower.includes("section") || lower.includes("code") || lower.includes("rule")) score += 25;
    if (lower.includes("therefore") || lower.includes("hence") || lower.includes("conclude") || lower.includes("thus")) score += 20;
let remarks = "Review the governing statutory provisions and ensure precise terminology is employed in your reasoning.";

if (score === 0) {
  remarks = "0 Score. Please answer diligently—life, liberty, and property depend on the legal consequences of your answer.";
}
    score = Math.min(100, Math.max(0, score));
  }

  const passed = score >= 75;
  const resultObj = {
    score: score,
    passed: passed,
    timestamp: new Date().toLocaleString(),
    subject: currentSubj,
    qId: BAR_QUESTIONS[currentSubj][currentIdx].id
  };

  submissionResults[key] = resultObj;
  historyLog.unshift(resultObj);

  document.getElementById("evaluation-result-area").innerHTML = renderResultHTML(key);
  document.getElementById("evaluation-result-area").scrollIntoView({ behavior: 'smooth' });
}

  }

  main.innerHTML = `
    <div class="panel-title" style="margin-bottom:16px;">Examinee Performance Archive (${historyLog.length} Evaluations)</div>
    <div style="background:#fbf9f2; border:1px solid var(--ink); padding:12px 20px;">
      ${historyLog.map(item => `
        <div class="hist-row">
          <div class="hist-score ${item.passed ? 'pass' : 'fail'}">${item.score}</div>
          <div class="hist-meta">
            <div class="hist-subj">${item.subject}</div>
            <div class="hist-q">${item.qId}</div>
          </div>
          <div class="hist-date">${item.timestamp}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function escapeHtml(text) {
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return text.replace(/[&<>"']/g, m => map[m]);
}

window.addEventListener('DOMContentLoaded', init);
// Dynamic Google Sheet Loader for Remedial Law
  const REMEDIAL_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_YII93J9lprfOT4cyQ0HSX3PEzcYa2DcjUul6qmKK-iyOuJiJjl6CiOUt3NRnS2VCS-ybmaFRmwDs/pub?output=csv';

  function loadRemedialFromSheet() {
    if (typeof Papa === 'undefined') return;
    
    Papa.parse(REMEDIAL_CSV_URL, {
      download: true,
      header: true,
      complete: function(results) {
        const sheetQuestions = results.data
          .filter(row => row.text && row.model)
          .map(row => ({
            id: row.id,
            subject: row.subject,
            bar_year: row.bar_year,
            question_no: row.question_no,
            text: row.text,
            model: row.model,
            caseLaw: row.caseLaw || ''
          }));

        if (typeof BAR_QUESTIONS !== 'undefined') {
          BAR_QUESTIONS["Remedial Law"] = sheetQuestions;
        }
      }
    });
  }

  loadRemedialFromSheet();
</script>
