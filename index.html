<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Exam Essay Simulator</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 750px; margin: 40px auto; padding: 20px; color: #1f2937; line-height: 1.6; background: #f8fafc; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .memo-box { background: #f1f5f9; border-left: 4px solid #2563eb; padding: 15px; margin-bottom: 20px; font-size: 0.95em; border-radius: 0 6px 6px 0; }
    textarea { width: 100%; height: 220px; margin-top: 8px; padding: 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: monospace; font-size: 14px; }
    button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 12px; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .next-btn { background: #059669; }
    .feedback { margin-top: 20px; padding: 16px; border-radius: 8px; display: none; font-size: 0.95em; }
    .correct { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .incorrect { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div id="quiz-container">
    <div id="exam-meta" style="color: #64748b; font-weight: bold; font-size: 0.85em; text-transform: uppercase;">Bar Exam MEE Simulator • Essay 1</div>
    <h2 id="subject-title" style="margin-top: 4px; color: #0f172a;">Torts / Contracts</h2>
    
    <div class="memo-box" id="question-text">
      Loading bar prompt...
    </div>

    <label for="user-answer" style="font-weight: 600; display: block; margin-top: 15px;">Your IRAC Essay Answer:</label>
    <textarea id="user-answer" placeholder="Type your Issue, Rule, Application, and Conclusion here..."></textarea>
    
    <button id="submit-btn" onclick="gradeAnswer()">Submit Essay for AI Grading</button>

    <div id="feedback-box" class="feedback"></div>

    <div id="next-container" class="hidden" style="margin-top: 20px;">
      <button class="next-btn" onclick="nextQuestion()">Next Essay Prompt ➔</button>
    </div>
  </div>

  <div id="end-screen" class="hidden" style="text-align: center; padding: 30px 0;">
    <h2>⚖️ Simulated Bar Exam Completed</h2>
    <p>You have finished all essay prompts.</p>
    <button onclick="restartQuiz()">Restart Simulator</button>
  </div>
</div>

<script>
  // GitHub Actions replaces this automatically during deployment if using your secret workflow
  const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";

  // Real Bar Exam (MEE Style) Sample Questions & Rubrics
  const quizData = [
    {
      subject: "Constitutional Law",
      prompt: "State legislature passes a law imposing a heavy tax exclusively on out-of-state publishing companies while exempting local in-state publishers. A national publishing firm sues, claiming it violates the Dormant Commerce Clause. Analyze the constitutionality of the state law.",
      rubric: "Must address: 1) Dormant Commerce Clause framework, 2) Discrimination against out-of-state economic actors, 3) Strict scrutiny / Market participant exception analysis, 4) Conclusion that the law is likely unconstitutional."
    },
    {
      subject: "Contracts / Sales",
      prompt: "Buyer sent a signed purchase order for 500 widgets at $10 each. Seller replied with an acknowledgment form containing an arbitration clause and shipping terms, but no signature. Seller later fails to deliver, and Buyer sues. Analyze the status of the contract under UCC Article 2.",
      rubric: "Must address: 1) UCC 2-207 (Battle of the Forms), 2) Formation of a contract despite different/additional terms, 3) Whether the arbitration clause becomes part of the contract (it's a material alteration between merchants), 4) Conclusion on breach."
    }
  ];

  let currentIndex = 0;

  function loadQuestion() {
    const q = quizData[currentIndex];
    document.getElementById("exam-meta").innerText = `Bar Exam MEE Simulator • Essay ${currentIndex + 1} of ${quizData.length}`;
    document.getElementById("subject-title").innerText = q.subject;
    document.getElementById("question-text").innerText = q.prompt;
    document.getElementById("user-answer").value = "";
    document.getElementById("user-answer").disabled = false;

    document.getElementById("feedback-box").style.display = "none";
    document.getElementById("next-container").classList.add("hidden");

    const submitBtn = document.getElementById("submit-btn");
    submitBtn.disabled = false;
    submitBtn.innerText = "Submit Essay for AI Grading";
  }

  async function gradeAnswer() {
    const userAnswer = document.getElementById("user-answer").value.trim();
    const feedbackBox = document.getElementById("feedback-box");
    const submitBtn = document.getElementById("submit-btn");

    if (!userAnswer) {
      alert("Please write your essay answer before submitting.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = "Grading Legal Analysis...";
    document.getElementById("user-answer").disabled = true;

    const q = quizData[currentIndex];
    const prompt = `
      You are a harsh, meticulous bar exam essay grader. Grade the applicant's essay using the IRAC method against the provided model rubric.
      Subject & Prompt: "${q.prompt}"
      Model Rubric Points: "${q.rubric}"
      Applicant's Essay: "${userAnswer}"

      Evaluate whether they hit the critical legal rules and applied them properly.
      Return strictly a JSON object matching this structure:
      {
        "isCorrect": true or false,
        "feedback": "Detailed 3-4 sentence bar grader breakdown explaining which rubric points were met, what legal analysis was missing, and a final scoring summary."
      }
    `;

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { responseMimeType: "application/json" }
        })
      });

      const data = await response.json();
      const result = JSON.parse(data.candidates[0].content.parts[0].text);

      feedbackBox.style.display = "block";
      feedbackBox.className = `feedback ${result.isCorrect ? 'correct' : 'incorrect'}`;
      feedbackBox.innerHTML = `<strong>${result.isCorrect ? '⚖️ Passing Analysis' : '⚠️ Needs Revision (Sub-passing)'}</strong><p style="margin-top: 8px;">${result.feedback}</p>`;

      document.getElementById("next-container").classList.remove("hidden");
      submitBtn.innerText = "Graded";

    } catch (err) {
      console.error(err);
      feedbackBox.style.display = "block";
      feedbackBox.className = "feedback incorrect";
      feedbackBox.innerText = "Error connecting to Gemini API. Check your GitHub Secrets configuration.";
      submitBtn.disabled = false;
      submitBtn.innerText = "Submit Essay for AI Grading";
      document.getElementById("user-answer").disabled = false;
    }
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex < quizData.length) {
      loadQuestion();
    } else {
      document.getElementById("quiz-container").classList.add("hidden");
      document.getElementById("end-screen").classList.remove("hidden");
    }
  }

  function restartQuiz() {
    currentIndex = 0;
    document.getElementById("end-screen").classList.add("hidden");
    document.getElementById("quiz-container").classList.remove("hidden");
    loadQuestion();
  }

  loadQuestion();
</script>

</body>
</html>
